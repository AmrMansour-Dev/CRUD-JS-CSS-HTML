<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="Style.css">
    <title>CRUDS</title>
</head>
<body>
    <div class="crud">
        <div class="head">
            <h2>crud</h2>
            <p>Product Management System</p>
        </div>
        <div class="inputs">
            <input id="title" type="text" placeholder="title">
            <div class="prices">
            <input onkeyup="GetTotalPrice()" id="price" type="number" placeholder="price">
            <input onkeyup="GetTotalPrice()" id="taxes" type="number" placeholder="taxes">
            <input onkeyup="GetTotalPrice()" id="ads" type="number" placeholder="ads">
            <input onkeyup="GetTotalPrice()" id="discount" type="number" placeholder="discount">
            <small onkeyup="GetTotalPrice()" id="total">-</small>
            </div>
        <input id="count" type="number" placeholder="count">
        <input id="category" type="text" placeholder="category">
        <button id="submit">Create</button>
        </div>
        <div class="searchblock">
            <input onkeyup="SearchTable(this.value)" id="searchbox" type="text" placeholder="Search">
            <div class="searchbuttons">
                <button onclick="GetSearchMode(this.id)" id="SearchByTitle">Search By Title</button>
                <button onclick="GetSearchMode(this.id)" id="SearchByCategory">Search By Category</button>
            </div>
        </div>
        <div id="deleteall">

        </div>
        <table>
            <tr>
                <th>id</th>
                <th>Title</th>
                <th>Price</th>
                <th>Taxes</th>
                <th>Ads</th>
                <th>Discount</th>
                <th>Total</th>
                <th>Category</th>
                <th>Update</th>
                <th>Delete</th>
            </tr>
            <tbody id="tbody">
                

            </tbody>
        </table>

        
    </div>
        <script src="main.js"></script>

</body>
</html>
